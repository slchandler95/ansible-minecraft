---

- name: Create minecraft directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ minecraft_base }}"
    - "{{ minecraft_backups }}"
    - "{{ minecraft_server }}"
    - "{{ minecraft_scripts }}"
    - "{{ minecraft_tmp }}"

- name: get version manifest
  ansible.builtin.uri:
    url: "{{ minecraft_version_manifest_url }}"
    body_format: json
  register: version_manifest

- name: debug version manifest
  debug:
    msg: "{{ version_manifest }}"

- name: get latest version
  set_fact:
    minecraft_version_latest: "{{ version_manifest.json.latest.release }}"

- name: debug latest version
  debug:
    msg: "{{ minecraft_version_latest }}"

- name: get latest version url
  set_fact:
    minecraft_version_latest_url: "{{ version_manifest.json | json_query(query) }}"
  vars:
    query: "versions[?id=='{{ minecraft_version_latest }}'].url | [0]"

- name: debug latest version url
  debug:
    msg: "{{ minecraft_version_latest_url }}"

- name: get latest version download url
  ansible.builtin.uri:
    url: "{{ minecraft_version_latest_url }}"
    body_format: json
  register: download_url

- name: debug latest version download url
  debug:
    msg: "{{ download_url }}"

- name: debug url
  debug:
    msg: "{{ download_url.json.downloads.server.url }}"

- name: download latest version
  ansible.builtin.get_url:
    url: "{{ download_url.json.downloads.server.url }}"
    dest: "{{ minecraft_server }}"
    checksum: "sha1:{{ download_url.json.downloads.server.sha1 }}"
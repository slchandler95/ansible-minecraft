---

- name: Create minecraft group
  ansible.builtin.group:
    name: minecraft
    state: present

- name: Create minecraft user
  ansible.builtin.user:
    name: minecraft
    group: minecraft
    shell: /bin/bash
    system: yes
    state: present

- name: Create minecraft directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ minecraft_base }}"
    - "{{ minecraft_backups }}"
    - "{{ minecraft_server }}"
    - "{{ minecraft_server }}/mods"
    - "{{ minecraft_scripts }}"
    - "{{ minecraft_temp }}"

- name: Create Vault Hunters ModPack directory
  ansible.builtin.file:
    path: "{{ minecraft_temp }}/{{ pack_name }}-{{ pack_version }}"
    state: directory

- name: Download Vault Hunters ModPack
  ansible.builtin.get_url:
    url: "{{ pack_url }}"
    dest: "{{ minecraft_temp }}/{{ pack_name }}-{{ pack_version }}.zip"
    checksum: "{{ pack_checksum }}"

- name: Extract Vault Hunters ModPack
  ansible.builtin.unarchive:
    src: "{{ minecraft_temp }}/{{ pack_name }}-{{ pack_version }}.zip"
    dest: "{{ minecraft_temp }}/{{ pack_name }}-{{ pack_version }}"

- name: Copy necessary ModPack directories
  ansible.builtin.copy:
    src: "{{ minecraft_temp }}/{{ pack_name }}-{{ pack_version }}/{{ item }}"
    dest: "{{ minecraft_server }}"
  loop:
    - "overrides/config"
    - "overrides/defaultconfigs"
    - "overrides/scripts"